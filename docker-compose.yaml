version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: adscale_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adscale_erp}
      POSTGRES_USER: ${POSTGRES_USER:-adscale_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adscale_user} -d ${POSTGRES_DB:-adscale_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - adscale_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adscale_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-adscale_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-adscale_erp}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-AdScale One ERP <no-reply@adscale.com>}
      OTP_EXPIRES_MINUTES: ${OTP_EXPIRES_MINUTES:-10}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - adscale_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://187.127.134.114:30917/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adscale_migrate
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-adscale_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-adscale_erp}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - adscale_network
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://187.127.134.114:30917/api}
    container_name: adscale_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - adscale_network

  nginx:
    image: nginx:alpine
    container_name: adscale_nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - adscale_network
    profiles:
      - ssl

volumes:
  postgres_data:
    name: adscale_postgres_data

networks:
  adscale_network:
    name: adscale_network
    driver: bridge
